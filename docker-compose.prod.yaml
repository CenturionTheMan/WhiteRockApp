services:
  backend:
    build:
      target: prod
    ports:
      - "8000:8000"
    restart: unless-stopped

  scheduler:
    restart: unless-stopped

  frontend:
    build:
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "81:80"
      - "443:443" # if using SSL termination here
    restart: unless-stopped
