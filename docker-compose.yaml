services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres-user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: whiterockdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres-user -d whiterockdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    command: uvicorn main:app --reload --port 8000 --host 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./Frontend
    ports:
      - "5713:5713"

volumes:
  postgres_data:
