networks:
  app-net:
    driver: bridge

services:
  db:
    image: postgres:16
    networks:
      - app-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}

  scheduler:
    build: ./Scheduler
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    networks:
      - app-net
    depends_on:
      - backend

volumes:
  postgres_data:
