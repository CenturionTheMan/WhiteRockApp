services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres-user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: whiterockdb
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres-user -d whiterockdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    command: uvicorn main:app --reload --port 8000 --host 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
      - ./shared:/app/shared
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: ./Scheduler
    volumes:
      - ./Scheduler:/app
      - ./shared:/app/shared
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./Frontend
    ports:
      - "5713:5713"
    volumes:
      - ./Frontend:/src/app
      - /src/app/node_modules
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

volumes:
  postgres_data:
